# ─────────────────────────────────────────────
# Outpost SIEM Configuration
# ─────────────────────────────────────────────

# Syslog ingestion
syslog:
  bind_address: "0.0.0.0"
  udp_port: 5514        # Use 514 in production (requires root or CAP_NET_BIND_SERVICE)
  tcp_port: 5514
  enable_udp: true
  enable_tcp: true      

# PostgreSQL storage
postgres:
  host: "localhost"
  port: 5432
  database: "outpost"
  user: "postgres"
  password: "s00ners!"
  batch_size: 1000
  flush_interval_ms: 1000

# REST API
api:
  bind_address: "0.0.0.0"
  port: 8080

# Integrations (API connectors)
integrations:
  m365:
    enabled: false
    tenant_id: ""
    client_id: ""
    client_secret: ""
    poll_interval_sec: 60
  azure:
    enabled: false
    tenant_id: ""
    client_id: ""
    client_secret: ""
    subscription_id: ""
    poll_interval_sec: 60

# Authentication
auth:
  default_admin_user: "admin"
  default_admin_pass: "outpost"
  session_ttl_hours: 24

# Parser configuration
parsers:
  # Parser order matters: more specific parsers first
  - fortigate
  - syslog    # catch-all, always last

# Logging
logging:
  level: "info"          # trace, debug, info, warn, error, critical
  file: ""               # empty = console only; set path for file logging

# Worker threads
workers:
  parser_threads: 2
