  <rect x="30" y="155" width="1040" height="75" rx="6" fill="#111827" stroke="#22c55e40" stroke-width="1"/>
  <text x="50" y="172" fill="#22c55e" font-size="10" font-weight="bold">INGESTION</text>

  <rect x="50" y="180" width="380" height="40" rx="4" fill="#1a2e1a" stroke="#22c55e" stroke-width="1"/>
  <text x="60" y="196" fill="#22c55e" font-size="11" font-weight="bold">SyslogListener</text>
  <text x="60" y="210" fill="#64748b" font-size="9">syslog_listener.h/cpp · UDP + TCP · poll()-based I/O · 293 lines</text>

  <rect x="450" y="180" width="380" height="40" rx="4" fill="#1a2e1a" stroke="#22c55e" stroke-width="1"/>
  <text x="460" y="196" fill="#22c55e" font-size="11" font-weight="bold">HttpPoller</text>
  <text x="460" y="210" fill="#64748b" font-size="9">http_poller.h/cpp · OAuth2 · M365 + Azure REST · 424 lines</text>

  <!-- Arrow: Ingestion → Ring Buffer -->
  <line x1="240" y1="220" x2="420" y2="260" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="640" y1="220" x2="580" y2="260" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ═══ RING BUFFER ═══ -->
  <rect x="350" y="250" width="300" height="45" rx="6" fill="#111827" stroke="#eab308" stroke-width="1.5" filter="url(#glow)"/>
  <text x="365" y="270" fill="#eab308" font-size="12" font-weight="bold">RingBuffer&lt;65536&gt;</text>
  <text x="365" y="285" fill="#64748b" font-size="9">ring_buffer.h · Lock-free MPSC · 8KB/slot · Heap-allocated · 141 lines</text>

  <!-- Arrow: Ring Buffer → Parsers -->
  <line x1="500" y1="295" x2="500" y2="320" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="510" y="312" fill="#475569" font-size="8">try_pop()</text>

  <!-- ═══ PARSER PIPELINE ═══ -->
  <rect x="30" y="318" width="700" height="100" rx="6" fill="#111827" stroke="#a855f740" stroke-width="1"/>
  <text x="50" y="335" fill="#a855f7" font-size="10" font-weight="bold">PARSER PIPELINE</text>
  <text x="250" y="335" fill="#475569" font-size="9">parser.h interface · First match wins · Order matters</text>

  <rect x="50" y="345" width="120" height="30" rx="3" fill="#2d1f3d" stroke="#f97316" stroke-width="1"/>
  <text x="110" y="364" text-anchor="middle" fill="#f97316" font-size="9">FortiGate KV</text>

  <rect x="180" y="345" width="120" height="30" rx="3" fill="#2d1f3d" stroke="#3b82f6" stroke-width="1"/>
  <text x="240" y="364" text-anchor="middle" fill="#3b82f6" font-size="9">Windows XML</text>

  <rect x="310" y="345" width="120" height="30" rx="3" fill="#2d1f3d" stroke="#a855f7" stroke-width="1"/>
  <text x="370" y="364" text-anchor="middle" fill="#a855f7" font-size="9">M365 JSON</text>

  <rect x="440" y="345" width="120" height="30" rx="3" fill="#2d1f3d" stroke="#06b6d4" stroke-width="1"/>
  <text x="500" y="364" text-anchor="middle" fill="#06b6d4" font-size="9">Azure JSON</text>

  <rect x="570" y="345" width="140" height="30" rx="3" fill="#2d1f3d" stroke="#64748b" stroke-width="1"/>
  <text x="640" y="364" text-anchor="middle" fill="#64748b" font-size="9">Syslog (catch-all)</text>

  <text x="50" y="405" fill="#475569" font-size="9">198 lines</text>
  <text x="180" y="405" fill="#475569" font-size="9">364 lines</text>
  <text x="310" y="405" fill="#475569" font-size="9">247 lines</text>
  <text x="440" y="405" fill="#475569" font-size="9">200 lines</text>
  <text x="570" y="405" fill="#475569" font-size="9">180 lines</text>

  <!-- Arrow connectors between parsers -->
  <text x="148" y="364" fill="#475569" font-size="14">→</text>
  <text x="278" y="364" fill="#475569" font-size="14">→</text>
  <text x="408" y="364" fill="#475569" font-size="14">→</text>
  <text x="538" y="364" fill="#475569" font-size="14">→</text>

