  <text x="50" y="815" fill="#e2e8f0" font-size="9">Dashboard: Stat cards · 24h timeline · Source/Severity/Category breakdowns · Top IPs/Users/Actions</text>
  <text x="50" y="828" fill="#e2e8f0" font-size="9">Events: Expandable table · FTS keyword search · Raw log viewer · Metadata JSON · Auto-refresh 5-10s</text>

  <!-- ═══ INFRASTRUCTURE BAR ═══ -->
  <rect x="30" y="855" width="1040" height="50" rx="6" fill="#111827" stroke="#64748b40" stroke-width="1"/>
  <text x="50" y="875" fill="#64748b" font-size="10" font-weight="bold">INFRASTRUCTURE</text>

  <text x="50" y="895" fill="#475569" font-size="9">main.cpp (194 lines) · Signal handling · Thread orchestration · Stats loop · Graceful shutdown</text>
