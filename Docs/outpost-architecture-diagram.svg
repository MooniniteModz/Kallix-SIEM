  <text x="60" y="522" fill="#64748b" font-size="9">storage_engine.h/cpp</text>
  <text x="60" y="532" fill="#64748b" font-size="9">615 lines · Batched inserts · WAL</text>

  <rect x="300" y="490" width="190" height="50" rx="4" fill="#1a2d3d" stroke="#06b6d480" stroke-width="1"/>
  <text x="310" y="510" fill="#06b6d4" font-size="10" font-weight="bold">SQLite + FTS5</text>
  <text x="310" y="524" fill="#64748b" font-size="9">outpost-YYYY-MM-DD.db</text>
  <text x="310" y="534" fill="#64748b" font-size="9">Daily rotation · 90-day retention</text>

  <text x="50" y="565" fill="#64748b" font-size="9">query() · count_by_field() · top_values() · event_timeline()</text>
  <text x="50" y="578" fill="#64748b" font-size="9">insert_alert() · get_alerts() · query_by_id()</text>

  <!-- ═══ RULE ENGINE ═══ -->
  <rect x="540" y="465" width="530" height="130" rx="6" fill="#111827" stroke="#ef444440" stroke-width="1"/>
  <text x="560" y="482" fill="#ef4444" font-size="10" font-weight="bold">DETECTION ENGINE</text>

  <rect x="560" y="490" width="240" height="50" rx="4" fill="#3d1a1a" stroke="#ef4444" stroke-width="1"/>
  <text x="570" y="508" fill="#ef4444" font-size="11" font-weight="bold">RuleEngine</text>
  <text x="570" y="522" fill="#64748b" font-size="9">rule_engine.h/cpp · 388 lines</text>
  <text x="570" y="532" fill="#64748b" font-size="9">Sliding windows · Cooldown · Callbacks</text>

  <rect x="820" y="490" width="230" height="50" rx="4" fill="#3d1a1a" stroke="#ef444480" stroke-width="1"/>
  <text x="830" y="508" fill="#ef4444" font-size="10" font-weight="bold">YAML Rules</text>
  <text x="830" y="522" fill="#64748b" font-size="9">config/rules/*.yaml</text>
  <text x="830" y="532" fill="#64748b" font-size="9">19 rules · 4 files</text>

  <text x="560" y="560" fill="#e2e8f0" font-size="9">⬤ Threshold — N events in window, grouped by field</text>
  <text x="560" y="573" fill="#e2e8f0" font-size="9">⬤ Sequence — ordered multi-step patterns</text>
  <text x="560" y="586" fill="#e2e8f0" font-size="9">⬤ ValueList — field matches known-bad set</text>

  <!-- Arrow: Rules → Storage (alerts) -->
  <line x1="560" y1="540" x2="510" y2="540" stroke="#ef4444" stroke-width="1" stroke-dasharray="4" marker-end="url(#arrow)"/>
  <text x="515" y="536" fill="#ef4444" font-size="7">fire_alert()</text>

  <!-- Arrow: Storage → API -->
  <line x1="270" y1="595" x2="270" y2="640" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

