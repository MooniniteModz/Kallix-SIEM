  <rect x="230" y="700" width="170" height="28" rx="3" fill="#2d2d1a" stroke="#eab30880" stroke-width="1"/>
  <text x="315" y="718" text-anchor="middle" fill="#eab308" font-size="9">/api/stats/severity</text>

  <rect x="410" y="700" width="170" height="28" rx="3" fill="#2d2d1a" stroke="#eab30880" stroke-width="1"/>
  <text x="495" y="718" text-anchor="middle" fill="#eab308" font-size="9">/api/stats/top-ips</text>

  <rect x="590" y="700" width="170" height="28" rx="3" fill="#2d2d1a" stroke="#eab30880" stroke-width="1"/>
  <text x="675" y="718" text-anchor="middle" fill="#eab308" font-size="9">/api/stats/timeline</text>

  <rect x="770" y="700" width="170" height="28" rx="3" fill="#2d2d1a" stroke="#eab30880" stroke-width="1"/>
  <text x="855" y="718" text-anchor="middle" fill="#eab308" font-size="9">/api/stats/top-users</text>

  <!-- Arrow: API → Frontend -->
  <line x1="550" y1="745" x2="550" y2="775" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="558" y="765" fill="#475569" font-size="8">JSON</text>

