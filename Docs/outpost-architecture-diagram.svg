  <rect x="750" y="318" width="320" height="100" rx="6" fill="#111827" stroke="#f9731640" stroke-width="1"/>
  <text x="770" y="335" fill="#f97316" font-size="10" font-weight="bold">EVENT SCHEMA</text>
  <text x="770" y="352" fill="#64748b" font-size="9">common/event.h · 185 lines</text>
  <text x="770" y="367" fill="#e2e8f0" font-size="9">event_id · timestamp · source_type</text>
  <text x="770" y="380" fill="#e2e8f0" font-size="9">severity · category · action · outcome</text>
  <text x="770" y="393" fill="#e2e8f0" font-size="9">src_ip · dst_ip · user · raw</text>
  <text x="770" y="406" fill="#e2e8f0" font-size="9">metadata (JSON) — extensible</text>

  <!-- Arrow: Parsers → Event Schema -->
  <line x1="700" y1="370" x2="748" y2="370" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Arrows: Event → Storage + Rules -->
  <line x1="500" y1="418" x2="300" y2="470" stroke="#06b6d4" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="500" y1="418" x2="750" y2="470" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="340" y="445" fill="#06b6d4" font-size="8">insert(event)</text>
  <text x="620" y="445" fill="#ef4444" font-size="8">evaluate(event)</text>

  <!-- ═══ STORAGE ═══ -->
  <rect x="30" y="465" width="480" height="130" rx="6" fill="#111827" stroke="#06b6d440" stroke-width="1"/>
  <text x="50" y="482" fill="#06b6d4" font-size="10" font-weight="bold">STORAGE LAYER</text>

  <rect x="50" y="490" width="230" height="50" rx="4" fill="#1a2d3d" stroke="#06b6d4" stroke-width="1"/>
