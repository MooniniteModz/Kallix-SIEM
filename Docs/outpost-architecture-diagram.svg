<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 920" font-family="ui-monospace, 'Cascadia Code', 'JetBrains Mono', monospace" font-size="11">
  <defs>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#3b82f6"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="920" rx="8" fill="#0a0e17"/>

  <!-- Title -->
  <text x="550" y="32" text-anchor="middle" fill="#3b82f6" font-size="16" font-weight="bold">OUTPOST SIEM — SYSTEM ARCHITECTURE</text>
  <text x="550" y="48" text-anchor="middle" fill="#475569" font-size="10">4,157 lines C++ · 30 tests · 19 detection rules · Single binary</text>

  <!-- ═══ LOG SOURCES ═══ -->
  <rect x="30" y="65" width="1040" height="65" rx="6" fill="#111827" stroke="#1e3a5f" stroke-width="1"/>
  <text x="50" y="82" fill="#3b82f6" font-size="10" font-weight="bold">LOG SOURCES</text>

  <rect x="50" y="90" width="140" height="30" rx="4" fill="#1e293b" stroke="#f97316" stroke-width="1"/>
  <text x="120" y="109" text-anchor="middle" fill="#f97316" font-size="10">FortiGate</text>

  <rect x="210" y="90" width="140" height="30" rx="4" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="280" y="109" text-anchor="middle" fill="#3b82f6" font-size="10">Windows Events</text>

  <rect x="370" y="90" width="140" height="30" rx="4" fill="#1e293b" stroke="#a855f7" stroke-width="1"/>
  <text x="440" y="109" text-anchor="middle" fill="#a855f7" font-size="10">M365 / Entra ID</text>

  <rect x="530" y="90" width="140" height="30" rx="4" fill="#1e293b" stroke="#06b6d4" stroke-width="1"/>
  <text x="600" y="109" text-anchor="middle" fill="#06b6d4" font-size="10">Azure Activity</text>

  <rect x="690" y="90" width="140" height="30" rx="4" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <text x="760" y="109" text-anchor="middle" fill="#64748b" font-size="10">Generic Syslog</text>

  <rect x="850" y="90" width="200" height="30" rx="4" fill="none" stroke="#1e293b" stroke-width="1" stroke-dasharray="4"/>
  <text x="950" y="109" text-anchor="middle" fill="#475569" font-size="9" font-style="italic">Meraki · Nutanix · Linux</text>

  <!-- ═══ Arrows: Sources → Ingestion ═══ -->
  <line x1="200" y1="120" x2="200" y2="160" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="360" y1="120" x2="310" y2="160" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="760" y1="120" x2="310" y2="160" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="440" y1="120" x2="680" y2="160" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="600" y1="120" x2="720" y2="160" stroke="#475569" stroke-width="1" marker-end="url(#arrow)"/>

  <text x="170" y="147" fill="#475569" font-size="8">syslog</text>
  <text x="620" y="147" fill="#475569" font-size="8">REST API</text>

